apply plugin: "com.android.application"
apply plugin: "com.facebook.react"
apply plugin: "org.jetbrains.kotlin.android"

react {
    /* Folders */
    //   The root of your project, i.e. where "package.json" lives. Default is '..'
    // root = file("../")
    //   The folder where the react-native package is. Default is ../node_modules/react-native
    // reactNativeDir = file("../node_modules/react-native")
    //   The folder where the react-native CLI is. Default is ../node_modules/react-native/cli.js
    // JSMainModuleName = "index"
}

/**
 * Set this to true to create four separate APKs instead of one.
 */
def enableSeparateBuildPerCPUArchitecture = false

/**
 * Set this to true to run Proguard on Release builds.
 */
def enableProguardInReleaseBuilds = false

android {
    namespace "com.appcomparativa"
    compileSdkVersion rootProject.ext.compileSdkVersion

    buildFeatures {
        buildConfig = true
    }

    defaultConfig {
        applicationId "com.appcomparativa"
        minSdkVersion rootProject.ext.minSdkVersion
        targetSdkVersion rootProject.ext.targetSdkVersion
        versionCode 1
        versionName "1.0"
    }

    signingConfigs {
        debug {
            storeFile file('debug.keystore')
            storePassword 'android'
            keyAlias 'androiddebugkey'
            keyPassword 'android'
        }
    }

    buildTypes {
        debug {
            signingConfig signingConfigs.debug
        }
        release {
            signingConfig signingConfigs.debug
            minifyEnabled enableProguardInReleaseBuilds
            proguardFiles getDefaultProguardFile("proguard-android.txt"), "proguard-rules.pro"
        }
    }
}

dependencies {
    // The version of react-native is set by the react property above
    implementation("com.facebook.react:react-android")
    implementation("com.facebook.react:hermes-android")

    if (hermesEnabled.toBoolean()) {
        implementation("com.facebook.react:hermes-android")
    } else {
        implementation jscFlavor
    }
}

apply from: file("../../node_modules/@react-native-community/cli-platform-android/native_modules.gradle"); applyNativeModulesAppBuildGradle(project)
